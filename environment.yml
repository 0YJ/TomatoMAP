name: TomatoMAP
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - setuptools>=70,<=81
  - wheel
  - pytorch=2.5.*
  - torchvision=0.20.*
  - torchaudio=2.5.*
  - numpy>=1.24,<2.0
  - scipy>=1.10,<1.13
  - pandas>=2.0,<2.3
  - matplotlib>=3.7,<3.9
  - scikit-learn>=1.3,<1.5
  - statsmodels>=0.14,<0.15
  - pillow>=10
  - opencv=4.10.*
  - jupyter
  - jupyterlab
  - notebook
  - pyyaml
  - tqdm
  - requests
  - tensorboard
  - cython
  - ninja
  - psutil>=5.8
  - polars>=0.20,<1.0
  - termcolor>=1.1
  - yacs>=0.1.8
  - tabulate
  - cloudpickle
  - omegaconf>=2.1,<2.4
  - hydra-core>=1.1,<1.4
  - packaging
  - libgcc-ng>=11
  - libstdcxx-ng>=11
  - pip:
      - fvcore>=0.1.5,<0.1.6
      - iopath>=0.1.7,<0.1.10
      - pycocotools>=2.0.2
      - ultralytics-thop>=2.0.18
